name: Deploy site to GitHub Pages

# Publishes the static shell (site/) to GitHub Pages — free and unlimited.
# Only runs when the page shell changes, NOT on every result: live results are
# fetched from data.json on GitHub, so the hosted page never needs redeploying.

on:
  push:
    branches: [main]
    paths:
      - 'site/index.html'
      - 'site/_headers'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
