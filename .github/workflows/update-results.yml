name: Update results

# A single job starts up and then checks for new results every 5 minutes for
# ~5.5 hours, committing data.json whenever something changed. The live page
# fetches data.json from GitHub directly, so NO Netlify redeploy happens here —
# updates are free. GitHub's cron scheduler is unreliable (it drops/delays
# scheduled runs heavily), so we DON'T rely on it to fire every 5 min — the
# schedule just (re)starts the long-running loop, and the concurrency group
# ensures only one loop runs at a time.

on:
  schedule:
    - cron: '*/20 * * * *'   # backstop: relaunch the loop if it ever dies
  workflow_dispatch:

concurrency:
  group: live-updater
  cancel-in-progress: false   # a queued trigger waits, then restarts the loop

permissions:
  contents: write

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Poll every 5 minutes and commit data on change
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          for i in $(seq 1 55); do
            echo "── iteration $i · $(date -u '+%Y-%m-%d %H:%M:%S') UTC ──"
            node update-results.js || echo "fetch failed this tick, will retry"
            if ! git diff --quiet site/data.json; then
              echo "Change detected → committing data.json (no deploy)"
              git add site/data.json
              git commit -m "Auto-update World Cup results"
              git pull --rebase --autostash || true
              git push || echo "push failed, will catch up next tick"
            else
              echo "No change."
            fi
            if [ "$i" -lt 55 ]; then sleep 300; fi
          done

      # Launch the next loop before this one ends, so coverage never gaps.
      # Needs LOOP_PAT (a fine-grained token); GitHub blocks the built-in token
      # from chaining workflow runs. If LOOP_PAT is absent, this is skipped and
      # the cron backstop is relied on instead.
      - name: Relaunch the loop
        if: always()
        env:
          GH_TOKEN: ${{ secrets.LOOP_PAT }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            gh workflow run update-results.yml --repo "$GITHUB_REPOSITORY"
            echo "Next loop dispatched."
          else
            echo "No LOOP_PAT set — relying on schedule backstop."
          fi
