name: Update results & deploy

on:
  schedule:
    # every 30 min at :07 and :37 — offset from :00/:30 because GitHub
    # throttles (and sometimes drops) schedules at the congested round times
    - cron: '7,37 * * * *'
  workflow_dispatch:          # allows manual runs from the Actions tab

concurrency:
  group: update-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Fetch latest World Cup results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node update-results.js

      - name: Check whether anything changed
        id: diff
        run: |
          if git diff --quiet site/index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new results."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Netlify
        if: steps.diff.outputs.changed == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --prod --dir=site

      - name: Commit updated results back to the repo
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "results-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/index.html
          git commit -m "Auto-update World Cup results"
          git push
